repos:
  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.88.24
    hooks:
      - id: trufflehog
        name: TruffleHog secret scan
        entry: trufflehog git file://. --since-commit HEAD --no-update --fail
        language: system
        pass_filenames: false
        always_run: true
